<div class="content-area">
  <div class="page-header">
    <h4>Service Requests</h4>
    <button class="btn btn-primary btn-sm" *ngIf="auth.hasRole('CITIZEN')" (click)="openModal()">
      <i class="bi bi-plus-lg me-1"></i> New Request
    </button>
  </div>

  <div *ngIf="error" class="alert alert-danger">{{ error }}</div>
  <div *ngIf="loading" class="text-center py-5"><div class="spinner-border text-amber"></div></div>

  <div class="card" *ngIf="!loading">
    <div class="card-body p-0">
      <div *ngIf="items.length === 0" class="text-center py-4 text-muted">No service requests found.</div>
      <table class="table table-hover mb-0" *ngIf="items.length > 0">
        <thead>
          <tr>
            <th>ID</th><th>Asset ID</th><th>Description</th><th>Submitted</th><th>Status</th>
            <th *ngIf="auth.hasRole('SUPERVISOR','ADMIN')">Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let r of items">
            <td>#{{ r.requestId }}</td>
            <td>{{ r.assetId }}</td>
            <td>{{ r.description }}</td>
            <td>{{ r.submittedAt | slice:0:10 }}</td>
            <td><span [class]="statusClass(r.status)">{{ r.status }}</span></td>
            <td *ngIf="auth.hasRole('SUPERVISOR','ADMIN')">
              <button class="btn btn-sm btn-outline-success me-1"
                *ngIf="r.status === 'PENDING' && auth.hasRole('SUPERVISOR')"
                (click)="approve(r)"
                title="Approve and auto-create Work Order">
                <i class="bi bi-check-circle me-1"></i>Approve
              </button>
              <button class="btn btn-sm btn-outline-danger me-1"
                *ngIf="r.status === 'PENDING' && auth.hasRole('SUPERVISOR')"
                (click)="reject(r.requestId)">
                <i class="bi bi-x-circle me-1"></i>Reject
              </button>
              <button class="btn btn-sm btn-outline-danger"
                *ngIf="auth.hasRole('ADMIN')"
                (click)="delete(r.requestId)">
                <i class="bi bi-trash"></i>
              </button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<!-- New Request Modal -->
<div class="modal d-block" tabindex="-1" *ngIf="showModal" style="background:rgba(0,0,0,0.5)">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">New Service Request</h5>
        <button type="button" class="btn-close" (click)="closeModal()"></button>
      </div>
      <div class="modal-body">
        <div class="mb-3">
          <label class="form-label">Asset</label>
          <select class="form-select" [(ngModel)]="form.assetId">
            <option [value]="0" disabled>-- Select an Asset --</option>
            <option *ngFor="let a of assets" [value]="a.assetId">{{ a.name }} ({{ a.type }}) - {{ a.location }}</option>
          </select>
          <small class="text-muted" *ngIf="assets.length === 0">Loading assets...</small>
        </div>
        <div class="mb-3">
          <label class="form-label">Description</label>
          <textarea class="form-control" [(ngModel)]="form.description" rows="3" required></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" (click)="closeModal()">Cancel</button>
        <button class="btn btn-primary" (click)="submit()" [disabled]="saving">
          <span *ngIf="saving" class="spinner-border spinner-border-sm me-1"></span>Submit
        </button>
      </div>
    </div>
  </div>
</div>
